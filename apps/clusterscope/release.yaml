---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: clusterscope
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/stuttgart-things/clusterscope-kustomize
  ref:
    tag: v0.3.0
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusterscope-deploy
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: clusterscope
  path: ./
  prune: true
  wait: true
