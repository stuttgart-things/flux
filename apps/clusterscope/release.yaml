---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: clusterscope-kustomize
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/stuttgart-things/clusterscope-kustomize
  ref:
    tag: ${CLUSTERSCOPE_VERSION:-0.11.0}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusterscope-deploy
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: clusterscope-kustomize
  path: ./
  prune: true
  wait: true
  targetNamespace: ${CLUSTERSCOPE_NAMESPACE:-clusterscope}
  patches:
    # Set -root to the git-sync synced subdirectory
    - target:
        kind: Deployment
        name: clusterscope
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterscope
        spec:
          template:
            spec:
              containers:
                - name: clusterscope
                  args:
                    - '-root=${GIT_SYNC_DIR:-/data/repo/clusters}'
                    - '-tech=${CLUSTERSCOPE_TECH:-flux}'
                    - '-serve=:${CLUSTERSCOPE_PORT:-8080}'
    # Add git-sync sidecar container
    # Auth for private repos: create a secret with username+password (HTTPS) or ssh key (SSH):
    #   kubectl create secret generic git-sync-auth \
    #     --from-literal=username=token --from-literal=password=<TOKEN> -n clusterscope
    # Then set GIT_SYNC_AUTH_SECRET=git-sync-auth in the Flux environment / postBuild substitution.
    - target:
        kind: Deployment
        name: clusterscope
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterscope
        spec:
          template:
            spec:
              containers:
                - name: git-sync
                  image: ${GIT_SYNC_IMAGE:-registry.k8s.io/git-sync/git-sync:v4.4.0}
                  args:
                    - '--repo=${GIT_SYNC_REPO}'
                    - '--ref=${GIT_SYNC_BRANCH:-main}'
                    - '--root=/data'
                    - '--period=${GIT_SYNC_PERIOD:-60s}'
                    - '--depth=1'
                  env:
                    - name: GITSYNC_ONE_TIME
                      value: "false"
                    # HTTPS auth (token/password) – uncomment and set GIT_SYNC_AUTH_SECRET:
                    # - name: GITSYNC_USERNAME
                    #   valueFrom:
                    #     secretKeyRef:
                    #       name: ${GIT_SYNC_AUTH_SECRET:-git-sync-auth}
                    #       key: username
                    # - name: GITSYNC_PASSWORD
                    #   valueFrom:
                    #     secretKeyRef:
                    #       name: ${GIT_SYNC_AUTH_SECRET:-git-sync-auth}
                    #       key: password
                  resources:
                    limits:
                      cpu: 100m
                      memory: 128Mi
                    requests:
                      cpu: 10m
                      memory: 32Mi
                  securityContext:
                    readOnlyRootFilesystem: true
                    runAsNonRoot: true
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                        - ALL
                    runAsUser: 65533
                  volumeMounts:
                    - name: gitdata
                      mountPath: /data
                    - name: git-sync-tmp
                      mountPath: /tmp
              volumes:
                - name: git-sync-tmp
                  emptyDir: {}
    # Remove the KCL-generated HTTPRoute (managed via httproute.yaml)
    - target:
        kind: HTTPRoute
        name: clusterscope
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: clusterscope
        $patch: delete
---
# Multi-repo deployment: sidecars (git-sync-harvester, git-sync-st-clusters, …) are
# baked into the OCI artifact by KCL — no runtime patching needed.
# Enable by setting CLUSTERSCOPE_MULTI_REPO=enabled in the Flux postBuild substitution.
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: clusterscope-kustomize-multi-repo
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/stuttgart-things/clusterscope-kustomize-multi-repo
  ref:
    tag: ${CLUSTERSCOPE_VERSION:-latest}
  # suspend: true  # remove to activate
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusterscope-deploy-multi-repo
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: clusterscope-kustomize-multi-repo
  path: ./
  prune: true
  wait: true
  targetNamespace: ${CLUSTERSCOPE_NAMESPACE:-clusterscope}
  # suspend: true  # remove to activate
  patches:
    # Remove the KCL-generated HTTPRoute (managed via httproute.yaml)
    - target:
        kind: HTTPRoute
        name: clusterscope
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: clusterscope
        $patch: delete
