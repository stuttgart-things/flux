---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homerun2-demo-pitcher
  namespace: ${HOMERUN2_NAMESPACE:-homerun2}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: homerun2-demo-pitcher-kustomize
  prune: true
  wait: true
  targetNamespace: ${HOMERUN2_NAMESPACE:-homerun2}
  patches:
    # Remove the Ingress from the kustomize base (we use Gateway API HTTPRoute)
    - target:
        kind: Ingress
        name: homerun2-demo-pitcher
      patch: |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: homerun2-demo-pitcher
        $patch: delete
    # Remove the KCL-generated HTTPRoute (we provide our own via the component)
    - target:
        kind: HTTPRoute
        name: homerun2-demo-pitcher
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: homerun2-demo-pitcher
        $patch: delete
    # Override the container image tag
    - target:
        kind: Deployment
        name: homerun2-demo-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-demo-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-demo-pitcher
                  image: ghcr.io/stuttgart-things/homerun2-demo-pitcher:${HOMERUN2_DEMO_PITCHER_VERSION:-v1.4.0}
    # Override the Redis password secret
    - target:
        kind: Secret
        name: homerun2-demo-pitcher-redis
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: homerun2-demo-pitcher-redis
        data:
          password: ${HOMERUN2_REDIS_PASSWORD_B64}
    # Mount trust-manager CA bundle for TLS trust
    - target:
        kind: Deployment
        name: homerun2-demo-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-demo-pitcher
        spec:
          template:
            spec:
              volumes:
                - name: trust-bundle
                  configMap:
                    name: ${HOMERUN2_DEMO_PITCHER_TRUST_BUNDLE_CM:-cluster-trust-bundle}
                    optional: true
              containers:
                - name: homerun2-demo-pitcher
                  env:
                    - name: SSL_CERT_FILE
                      value: /etc/ssl/custom/trust-bundle.pem
                  volumeMounts:
                    - name: trust-bundle
                      mountPath: /etc/ssl/custom/trust-bundle.pem
                      subPath: trust-bundle.pem
                      readOnly: true
    # Override Redis connection to point to the co-deployed redis-stack
    - target:
        kind: Deployment
        name: homerun2-demo-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-demo-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-demo-pitcher
                  env:
                    - name: REDIS_ADDR
                      value: redis-stack.${HOMERUN2_NAMESPACE:-homerun2}.svc.cluster.local
                    - name: REDIS_PORT
                      value: "6379"
                    - name: OMNI_PITCHER_API_PATH
                      value: pitch
                    - name: OMNI_PITCHER_URL
                      value: https://pitcher.${DOMAIN}
                    - name: PITCH_TARGET
                      value: omni-pitcher
                    - name: AUTH_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: homerun2-omni-pitcher-token
                          key: auth-token
