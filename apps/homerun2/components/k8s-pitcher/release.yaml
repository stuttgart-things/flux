---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homerun2-k8s-pitcher
  namespace: ${HOMERUN2_K8S_PITCHER_NAMESPACE:-homerun2-flux}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: homerun2-k8s-pitcher-kustomize
  prune: true
  wait: true
  targetNamespace: ${HOMERUN2_K8S_PITCHER_NAMESPACE:-homerun2-flux}
  patches:
    # Override the container image tag
    - target:
        kind: Deployment
        name: homerun2-k8s-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-k8s-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-k8s-pitcher
                  image: ghcr.io/stuttgart-things/homerun2-k8s-pitcher:${HOMERUN2_K8S_PITCHER_VERSION:-v0.2.0}
    # Override the auth token secret
    - target:
        kind: Secret
        name: homerun2-k8s-pitcher-token
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: homerun2-k8s-pitcher-token
        stringData:
          auth-token: ${HOMERUN2_K8S_PITCHER_AUTH_TOKEN:-changeme}
