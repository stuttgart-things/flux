---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homerun2-k8s-pitcher
  namespace: ${HOMERUN2_K8S_PITCHER_NAMESPACE:-homerun2-flux}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: homerun2-k8s-pitcher-kustomize
  prune: true
  wait: true
  targetNamespace: ${HOMERUN2_K8S_PITCHER_NAMESPACE:-homerun2-flux}
  patches:
    # Override the container image tag
    - target:
        kind: Deployment
        name: homerun2-k8s-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-k8s-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-k8s-pitcher
                  image: ghcr.io/stuttgart-things/homerun2-k8s-pitcher:${HOMERUN2_K8S_PITCHER_VERSION:-v0.2.0}
    # Override the auth token secret
    - target:
        kind: Secret
        name: homerun2-k8s-pitcher-token
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: homerun2-k8s-pitcher-token
        stringData:
          auth-token: ${HOMERUN2_OMNI_PITCHER_AUTH_TOKEN:-changeme}
    # Mount trust-manager CA bundle for TLS trust
    - target:
        kind: Deployment
        name: homerun2-k8s-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-k8s-pitcher
        spec:
          template:
            spec:
              volumes:
                - name: trust-bundle
                  configMap:
                    name: ${HOMERUN2_K8S_PITCHER_TRUST_BUNDLE_CM:-cluster-trust-bundle}
                    optional: true
              containers:
                - name: homerun2-k8s-pitcher
                  env:
                    - name: SSL_CERT_DIR
                      value: /etc/ssl/custom
                  volumeMounts:
                    - name: trust-bundle
                      mountPath: /etc/ssl/custom/trust-bundle.pem
                      subPath: trust-bundle.pem
                      readOnly: true
    # Override the profile ConfigMap reference
    # The calling side defines the profile CM with cluster-specific config
    - target:
        kind: Deployment
        name: homerun2-k8s-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-k8s-pitcher
        spec:
          template:
            spec:
              volumes:
                - name: profile
                  configMap:
                    name: ${HOMERUN2_K8S_PITCHER_PROFILE_CM:-homerun2-k8s-pitcher-profile}
    # Add webhook containerPort
    - target:
        kind: Deployment
        name: homerun2-k8s-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-k8s-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-k8s-pitcher
                  ports:
                    - containerPort: 8080
                      name: webhook
                      protocol: TCP
    # Remove the KCL-generated profile ConfigMap (calling side provides its own)
    - target:
        kind: ConfigMap
        name: homerun2-k8s-pitcher-profile
      patch: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: homerun2-k8s-pitcher-profile
        $patch: delete
