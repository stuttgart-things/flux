---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homerun2-omni-pitcher
  namespace: ${HOMERUN2_NAMESPACE:-homerun2}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: homerun2-omni-pitcher-kustomize
  prune: true
  wait: true
  targetNamespace: ${HOMERUN2_NAMESPACE:-homerun2}
  patches:
    # Remove the Ingress from the kustomize base (we use Gateway API HTTPRoute)
    - target:
        kind: Ingress
        name: homerun2-omni-pitcher
      patch: |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: homerun2-omni-pitcher
        $patch: delete
    # Override the container image tag
    - target:
        kind: Deployment
        name: homerun2-omni-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-omni-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-omni-pitcher
                  image: ghcr.io/stuttgart-things/homerun2-omni-pitcher:${HOMERUN2_OMNI_PITCHER_VERSION:-v1.2.0}
    # Override the auth token secret
    - target:
        kind: Secret
        name: homerun2-omni-pitcher-token
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: homerun2-omni-pitcher-token
        stringData:
          auth-token: ${HOMERUN2_OMNI_PITCHER_AUTH_TOKEN:-changeme}
    # Override the Redis password secret
    - target:
        kind: Secret
        name: homerun2-omni-pitcher-redis
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: homerun2-omni-pitcher-redis
        data:
          password: ${HOMERUN2_REDIS_PASSWORD_B64}
    # Override Redis connection to point to the co-deployed redis-stack
    - target:
        kind: Deployment
        name: homerun2-omni-pitcher
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: homerun2-omni-pitcher
        spec:
          template:
            spec:
              containers:
                - name: homerun2-omni-pitcher
                  env:
                    - name: REDIS_ADDR
                      value: redis-stack.${HOMERUN2_NAMESPACE:-homerun2}.svc.cluster.local
                    - name: REDIS_PORT
                      value: "6379"
