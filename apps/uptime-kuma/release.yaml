---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
spec:
  interval: 30m
  chart:
    spec:
      chart: uptime-kuma
      version: ${UPTIME_KUMA_VERSION:-4.0.0}
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
      interval: 12h
  values:
    volume:
      enabled: true
      accessMode: ReadWriteOnce
      size: ${UPTIME_KUMA_STORAGE_SIZE:-4Gi}
      storageClassName: ${UPTIME_KUMA_STORAGE_CLASS:-nfs4-csi}
