---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-monitors
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
data:
  monitors.json: |
    [
      {
        "name": "Flux Web UI",
        "type": "http",
        "url": "https://${FLUX_HOSTNAME}.${DOMAIN}",
        "interval": 60,
        "maxretries": 3,
        "ignoreTls": true
      },
      {
        "name": "Vault",
        "type": "http",
        "url": "https://${VAULT_HOSTNAME}.${DOMAIN}",
        "interval": 60,
        "maxretries": 3,
        "ignoreTls": true
      },
      {
        "name": "Claim Machinery API",
        "type": "http",
        "url": "https://${CLAIM_API_HOSTNAME}.${DOMAIN}",
        "interval": 60,
        "maxretries": 3,
        "ignoreTls": true
      },
      {
        "name": "Uptime Kuma",
        "type": "http",
        "url": "https://${UPTIME_HOSTNAME}.${DOMAIN}",
        "interval": 60,
        "maxretries": 3,
        "ignoreTls": true
      }
    ]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uptime-kuma-setup
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: uptime-kuma-setup
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: uptime-kuma-setup
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: uptime-kuma-setup
subjects:
  - kind: ServiceAccount
    name: uptime-kuma-setup
    namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-setup
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
  annotations:
    kustomize.toolkit.fluxcd.io/force: "enabled"
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: uptime-kuma-setup
      containers:
        - name: setup
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install -q uptime-kuma-api kubernetes &&
              python3 /scripts/setup.py
          env:
            - name: KUMA_URL
              value: "http://uptime-kuma.${UPTIME_KUMA_NAMESPACE:-uptime-kuma}.svc:3001"
            - name: NAMESPACE
              value: "${UPTIME_KUMA_NAMESPACE:-uptime-kuma}"
            - name: ADMIN_USER
              value: "${UPTIME_KUMA_ADMIN_USER:-admin}"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: monitors
              mountPath: /config
      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-setup-script
        - name: monitors
          configMap:
            name: uptime-kuma-monitors
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-setup-script
  namespace: ${UPTIME_KUMA_NAMESPACE:-uptime-kuma}
data:
  setup.py: |
    import json
    import os
    import secrets
    import string
    from uptime_kuma_api import UptimeKumaApi
    from kubernetes import client, config

    url = os.environ["KUMA_URL"]
    namespace = os.environ["NAMESPACE"]
    user = os.environ["ADMIN_USER"]
    secret_name = "uptime-kuma-admin"

    # Load in-cluster k8s config
    config.load_incluster_config()
    v1 = client.CoreV1Api()

    # Check if admin secret already exists
    password = None
    try:
        secret = v1.read_namespaced_secret(secret_name, namespace)
        import base64
        password = base64.b64decode(secret.data["password"]).decode()
        print(f"Found existing admin secret '{secret_name}'.")
    except client.exceptions.ApiException as e:
        if e.status == 404:
            # Generate a random password
            alphabet = string.ascii_letters + string.digits
            password = ''.join(secrets.choice(alphabet) for _ in range(24))
            # Create the secret
            secret = client.V1Secret(
                metadata=client.V1ObjectMeta(name=secret_name),
                type="Opaque",
                string_data={"username": user, "password": password}
            )
            v1.create_namespaced_secret(namespace, secret)
            print(f"Generated password and created secret '{secret_name}'.")
        else:
            raise

    import time as _time

    print(f"Connecting to {url}...")
    api = None
    for attempt in range(12):
        try:
            api = UptimeKumaApi(url, timeout=30, wait_events=3)
            break
        except Exception as e:
            print(f"  Connection attempt {attempt+1}/12 failed: {e}")
            _time.sleep(15)
    if api is None:
        print("ERROR: Could not connect after all retries.")
        sys.exit(1)

    # Setup admin account if needed
    if api.need_setup():
        print("Running initial setup...")
        api.setup(user, password)
        print("Admin account created.")
    else:
        print("Setup already done, logging in...")
        api.login(user, password)

    # Load desired monitors
    with open("/config/monitors.json") as f:
        desired = json.load(f)

    # Get existing monitors
    existing = {m["name"]: m for m in api.get_monitors()}
    print(f"Found {len(existing)} existing monitors.")

    # Create or update monitors
    for monitor in desired:
        name = monitor["name"]
        if name in existing:
            print(f"  Monitor '{name}' already exists, skipping.")
        else:
            print(f"  Creating monitor '{name}'...")
            api.add_monitor(**monitor)
            print(f"  Monitor '{name}' created.")

    print("Done. All monitors configured.")
    api.disconnect()
