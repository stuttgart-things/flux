---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-stack
  namespace: ${DAPR_REDIS_NAMESPACE:-dapr-redis}
spec:
  interval: 30m
  chart:
    spec:
      chart: redis
      version: ${DAPR_REDIS_VERSION:-17.1.4}
      sourceRef:
        kind: HelmRepository
        name: stuttgart-things-redis
        namespace: ${DAPR_REDIS_NAMESPACE:-dapr-redis}
      interval: 12h
  values:
    auth:
      existingSecret: ${DAPR_REDIS_AUTH_SECRET:-redis-auth}
      existingSecretPasswordKey: ${DAPR_REDIS_AUTH_KEY:-password}
    sentinel:
      enabled: true
      masterSet: mymaster
      quorum: 1
      parallelSyncs: 1
      service:
        type: ${DAPR_REDIS_SERVICE_TYPE:-ClusterIP}
      image:
        registry: ${DAPR_REDIS_SENTINEL_REGISTRY:-ghcr.io}
        repository: ${DAPR_REDIS_SENTINEL_REPOSITORY:-stuttgart-things/redis-sentinel}
        tag: ${DAPR_REDIS_SENTINEL_VERSION:-7.4.2-debian-12-r9}
    image:
      registry: ${DAPR_REDIS_IMAGE_REGISTRY:-ghcr.io}
      repository: ${DAPR_REDIS_IMAGE_REPOSITORY:-stuttgart-things/redis-stack-server}
      tag: ${DAPR_REDIS_IMAGE_VERSION:-7.2.0-v18}
    master:
      persistence:
        enabled: ${DAPR_REDIS_PERSISTENCE_ENABLED:-true}
        storageClass: ${DAPR_REDIS_STORAGE_CLASS:-standard}
        size: ${DAPR_REDIS_STORAGE_SIZE:-8Gi}
      args:
        - -c
        - /opt/bitnami/scripts/merged-start-scripts/start-master.sh
      extraVolumes:
        - name: merged-start-scripts
          configMap:
            name: bitnami-redis-stack-server-merged
            defaultMode: 0755
      extraVolumeMounts:
        - name: merged-start-scripts
          mountPath: /opt/bitnami/scripts/merged-start-scripts
    replica:
      persistence:
        enabled: ${DAPR_REDIS_PERSISTENCE_ENABLED:-true}
        storageClass: ${DAPR_REDIS_STORAGE_CLASS:-standard}
        size: ${DAPR_REDIS_STORAGE_SIZE:-8Gi}
      replicaCount: 1
      args:
        - -c
        - /opt/bitnami/scripts/merged-start-scripts/start-replica.sh
      extraVolumes:
        - name: merged-start-scripts
          configMap:
            name: bitnami-redis-stack-server-merged
            defaultMode: 0755
      extraVolumeMounts:
        - name: merged-start-scripts
          mountPath: /opt/bitnami/scripts/merged-start-scripts
    extraDeploy:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: bitnami-redis-stack-server-merged
        data:
          start-master.sh: |
            #!/usr/bin/dumb-init /bin/bash
            ### docker entrypoint script, for starting redis stack
            BASEDIR=/opt/redis-stack
            cd $${BASEDIR}
            CMD=$${BASEDIR}/bin/redis-server
            if [ -z "$${REDISEARCH_ARGS}" ]; then
            REDISEARCH_ARGS="MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000"
            fi
            [[ -f $REDIS_PASSWORD_FILE ]] && export REDIS_PASSWORD="$(< "$${REDIS_PASSWORD_FILE}")"
            if [[ -f /opt/bitnami/redis/mounted-etc/master.conf ]];then
                cp /opt/bitnami/redis/mounted-etc/master.conf /opt/bitnami/redis/etc/master.conf
            fi
            if [[ -f /opt/bitnami/redis/mounted-etc/redis.conf ]];then
                cp /opt/bitnami/redis/mounted-etc/redis.conf /opt/bitnami/redis/etc/redis.conf
            fi
            $${CMD} \
            --port "$${REDIS_PORT}" \
            --requirepass "$${REDIS_PASSWORD}" \
            --masterauth "$${REDIS_PASSWORD}" \
            --include "/opt/bitnami/redis/etc/redis.conf" \
            --include "/opt/bitnami/redis/etc/master.conf" \
            --loadmodule /opt/redis-stack/lib/redisearch.so $${REDISEARCH_ARGS} \
            --loadmodule /opt/redis-stack/lib/redistimeseries.so $${REDISTIMESERIES_ARGS} \
            --loadmodule /opt/redis-stack/lib/rejson.so $${REDISJSON_ARGS} \
            --loadmodule /opt/redis-stack/lib/redisbloom.so $${REDISBLOOM_ARGS}
          start-replica.sh: |
            #!/usr/bin/dumb-init /bin/bash
            BASEDIR=/opt/redis-stack
            cd $${BASEDIR}
            CMD=$${BASEDIR}/bin/redis-server
            get_port() {
                hostname="$1"
                type="$2"
                port_var=$(echo "$${hostname^^}_SERVICE_PORT_$type" | sed "s/-/_/g")
                port=$${!port_var}
                if [ -z "$port" ]; then
                    case $type in
                        "SENTINEL")
                            echo 26379
                            ;;
                        "REDIS")
                            echo 6379
                            ;;
                    esac
                else
                    echo $port
                fi
            }
            get_full_hostname() {
                hostname="$1"
                echo "$${hostname}.$${HEADLESS_SERVICE}"
            }
            REDISPORT=$(get_port "$HOSTNAME" "REDIS")
            [[ -f $REDIS_PASSWORD_FILE ]] && export REDIS_PASSWORD="$(< "$${REDIS_PASSWORD_FILE}")"
            [[ -f $REDIS_MASTER_PASSWORD_FILE ]] && export REDIS_MASTER_PASSWORD="$(< "$${REDIS_MASTER_PASSWORD_FILE}")"
            if [[ -f /opt/bitnami/redis/mounted-etc/replica.conf ]];then
                cp /opt/bitnami/redis/mounted-etc/replica.conf /opt/bitnami/redis/etc/replica.conf
            fi
            if [[ -f /opt/bitnami/redis/mounted-etc/redis.conf ]];then
                cp /opt/bitnami/redis/mounted-etc/redis.conf /opt/bitnami/redis/etc/redis.conf
            fi
            echo "" >> /opt/bitnami/redis/etc/replica.conf
            echo "replica-announce-port $REDISPORT" >> /opt/bitnami/redis/etc/replica.conf
            echo "replica-announce-ip $(get_full_hostname "$HOSTNAME")" >> /opt/bitnami/redis/etc/replica.conf
            $${CMD} \
            --port "$${REDIS_PORT}" \
            --requirepass "$${REDIS_PASSWORD}" \
            --masterauth "$${REDIS_PASSWORD}" \
            --include "/opt/bitnami/redis/etc/redis.conf" \
            --include "/opt/bitnami/redis/etc/replica.conf" \
            --loadmodule /opt/redis-stack/lib/redisearch.so $${REDISEARCH_ARGS} \
            --loadmodule /opt/redis-stack/lib/redistimeseries.so $${REDISTIMESERIES_ARGS} \
            --loadmodule /opt/redis-stack/lib/rejson.so $${REDISJSON_ARGS} \
            --loadmodule /opt/redis-stack/lib/redisbloom.so $${REDISBLOOM_ARGS}
