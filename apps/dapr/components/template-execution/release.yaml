---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dapr-backstage-template-execution
  namespace: ${DAPR_BACKSTAGE_TPL_NAMESPACE:-backstage-workflows}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: dapr-backstage-template-execution-kustomize
  prune: true
  wait: true
  targetNamespace: ${DAPR_BACKSTAGE_TPL_NAMESPACE:-backstage-workflows}
  patches:
    # Override the container image tag and strip the CA volume / mount /
    # SSL_CERT_FILE env so the pod can start without a real backstage-ca
    # ConfigMap in the cluster. Re-add a real CA (or re-enable _enableCA
    # in main.k and provide the ConfigMap here) when TLS trust for
    # Backstage is actually needed.
    - target:
        kind: Deployment
        name: backstage-template-execution
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: backstage-template-execution
        spec:
          template:
            spec:
              volumes:
                - $patch: delete
                  name: backstage-ca
              containers:
                - name: workflow
                  image: ghcr.io/stuttgart-things/dapr-backstage-template-execution:${DAPR_BACKSTAGE_TPL_IMAGE_TAG:-49b147e70413}
                  volumeMounts:
                    - $patch: delete
                      name: backstage-ca
                  env:
                    - $patch: delete
                      name: SSL_CERT_FILE
    # Drop placeholder Secrets from the kustomize base — real secrets come
    # from this flux app (see secrets.yaml) so they can be managed via SOPS
    # or substituteFrom.
    - target:
        kind: Secret
        name: github-token
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: github-token
        $patch: delete
    - target:
        kind: Secret
        name: backstage-auth-token
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: backstage-auth-token
        $patch: delete
    - target:
        kind: Secret
        name: redis-password
      patch: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: redis-password
        $patch: delete
    # Drop the placeholder CA ConfigMap from the kustomize base; provide the
    # real CA via substituteFrom or disable CA mount at build time.
    - target:
        kind: ConfigMap
        name: backstage-ca
      patch: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: backstage-ca
        $patch: delete
    # Override the Redis host the Dapr statestore Component points at.
    # The KCL base bakes `redis-stack.homerun2-flux.svc.cluster.local:6379`
    # as the build-time default (homerun2 dev cluster); per-cluster
    # deployments set DAPR_BACKSTAGE_TPL_REDIS_HOST to their own Redis
    # endpoint via the cluster-side Flux Kustomization's postBuild.substitute.
    - target:
        group: dapr.io
        version: v1alpha1
        kind: Component
        name: statestore
      patch: |
        - op: replace
          path: /spec/metadata/0/value
          value: ${DAPR_BACKSTAGE_TPL_REDIS_HOST:-redis-stack.homerun2-flux.svc.cluster.local:6379}
