---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher-httproute
  namespace: ${RANCHER_NAMESPACE:-cattle-system}
spec:
  interval: 30m
  chart:
    spec:
      chart: sthings-cluster
      version: ${STHINGS_CLUSTER_VERSION:-0.3.20}
      sourceRef:
        kind: HelmRepository
        name: stuttgart-things
        namespace: ${RANCHER_NAMESPACE:-cattle-system}
      interval: 12h
  values:
    customresources:
      rancher-referencegrant:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: ReferenceGrant
        metadata:
          name: rancher-gateway-access
          namespace: ${RANCHER_NAMESPACE:-cattle-system}
          labels:
            app.kubernetes.io/name: rancher
            app.kubernetes.io/instance: rancher
        spec:
          from:
            - group: gateway.networking.k8s.io
              kind: Gateway
              namespace: ${GATEWAY_NAMESPACE:-default}
          to:
            - group: ""
              kind: Service
      rancher-httproute:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: rancher
          namespace: ${RANCHER_NAMESPACE:-cattle-system}
          labels:
            app.kubernetes.io/name: rancher
            app.kubernetes.io/instance: rancher
        spec:
          hostnames:
            - ${INGRESS_HOSTNAME:-rancher}.${INGRESS_DOMAIN}
          parentRefs:
            - name: ${GATEWAY_NAME}
              namespace: ${GATEWAY_NAMESPACE:-default}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: rancher
                  namespace: ${RANCHER_NAMESPACE:-cattle-system}
                  port: 80
