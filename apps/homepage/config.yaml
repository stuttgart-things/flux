---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: ${HOMEPAGE_NAMESPACE:-homepage}
data:
  services.yaml: |
    - Cluster Services:
        - Flux Web UI:
            icon: si-flux
            href: https://${FLUX_HOSTNAME}.${DOMAIN}
            description: Flux GitOps Dashboard
            siteMonitor: https://${FLUX_HOSTNAME}.${DOMAIN}
        - Vault:
            icon: si-vault
            href: https://${VAULT_HOSTNAME}.${DOMAIN}
            description: HashiCorp Vault
            siteMonitor: https://${VAULT_HOSTNAME}.${DOMAIN}
        - Claim Machinery API:
            icon: mdi-api
            href: https://${CLAIM_API_HOSTNAME}.${DOMAIN}
            description: Claim Machinery API
            siteMonitor: https://${CLAIM_API_HOSTNAME}.${DOMAIN}
        - Uptime Kuma:
            icon: si-uptimekuma
            href: https://${UPTIME_HOSTNAME}.${DOMAIN}
            description: Uptime Monitoring
            siteMonitor: https://${UPTIME_HOSTNAME}.${DOMAIN}
  settings.yaml: |
    title: movie-scripts2
    favicon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/svg/kubernetes.svg
    headerStyle: clean
    layout:
      Cluster Services:
        style: row
        columns: 4
  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: si-github
              href: https://github.com/stuttgart-things
        - Flux Repo:
            - icon: si-flux
              href: https://github.com/stuttgart-things/flux
  kubernetes.yaml: |
    mode: cluster
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: movie-scripts2
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
