---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusterbook-operator
  namespace: ${CLUSTERBOOK_OPERATOR_NAMESPACE:-clusterbook-system}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: clusterbook-operator-kustomize
  prune: true
  wait: true
  targetNamespace: ${CLUSTERBOOK_OPERATOR_NAMESPACE:-clusterbook-system}
  patches:
    # Override the container image tag
    - target:
        kind: Deployment
        name: clusterbook-operator
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterbook-operator
        spec:
          template:
            spec:
              containers:
                - name: manager
                  image: ghcr.io/stuttgart-things/clusterbook-operator:${CLUSTERBOOK_OPERATOR_VERSION:-0.17.0}
    # Mount trust-manager CA bundle so the operator can verify the
    # internal clusterbook server (clusterbook.infra.sthings-vsphere…)
    # when ProviderConfig.spec.insecureSkipVerify is false.
    - target:
        kind: Deployment
        name: clusterbook-operator
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterbook-operator
        spec:
          template:
            spec:
              volumes:
                - name: trust-bundle
                  configMap:
                    name: ${CLUSTERBOOK_OPERATOR_TRUST_BUNDLE_CONFIGMAP:-cluster-trust-bundle}
                    optional: true
              containers:
                - name: manager
                  env:
                    - name: SSL_CERT_DIR
                      value: ${CLUSTERBOOK_OPERATOR_SSL_CERT_DIR:-/etc/ssl/custom}
                  volumeMounts:
                    - name: trust-bundle
                      mountPath: ${CLUSTERBOOK_OPERATOR_SSL_CERT_DIR:-/etc/ssl/custom}/${CLUSTERBOOK_OPERATOR_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      subPath: ${CLUSTERBOOK_OPERATOR_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      readOnly: true
