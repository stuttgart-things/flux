---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusterbook
  namespace: ${CLUSTERBOOK_NAMESPACE:-clusterbook}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: clusterbook-kustomize
  prune: true
  wait: true
  targetNamespace: ${CLUSTERBOOK_NAMESPACE:-clusterbook}
  patches:
    # Override the container image tag
    - target:
        kind: Deployment
        name: clusterbook
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterbook
        spec:
          template:
            spec:
              containers:
                - name: clusterbook
                  image: ghcr.io/stuttgart-things/clusterbook:${CLUSTERBOOK_VERSION:-1.25.0}
    # Override PowerDNS config in ConfigMap
    - target:
        kind: ConfigMap
        name: clusterbook-config
      patch: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: clusterbook-config
        data:
          PDNS_ENABLED: ${PDNS_ENABLED:-false}
          PDNS_URL: ${PDNS_URL:-}
          PDNS_ZONE: ${PDNS_ZONE:-}
    # Add secretRef for PDNS token to Deployment
    - target:
        kind: Deployment
        name: clusterbook
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: clusterbook
        spec:
          template:
            spec:
              containers:
                - name: clusterbook
                  envFrom:
                    - configMapRef:
                        name: clusterbook-config
                    - secretRef:
                        name: clusterbook-pdns
    # Remove the KCL-generated HTTPRoute (we provide our own via flux)
    - target:
        kind: HTTPRoute
        name: clusterbook
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: clusterbook
        $patch: delete
