---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-web
  namespace: ${FLUX_WEB_NAMESPACE:-flux-system}
spec:
  interval: 30m
  chart:
    spec:
      chart: flux-operator
      version: ${FLUX_WEB_VERSION:-0.43.0}
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: ${FLUX_WEB_NAMESPACE:-flux-system}
      interval: 12h
  values:
    fullnameOverride: flux-web
    installCRDs: false
    web:
      serverOnly: true
      networkPolicy:
        create: false
      httpRoute:
        enabled: true
        parentRefs:
          - name: ${GATEWAY_NAME}
            namespace: ${GATEWAY_NAMESPACE:-default}
        hostnames:
          - "${HOSTNAME}.${DOMAIN}"
