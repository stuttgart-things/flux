---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-flux-web-ingress
  namespace: ${FLUX_WEB_NAMESPACE:-flux-system}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: flux-web
      app.kubernetes.io/name: flux-operator
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 9080
          protocol: TCP
