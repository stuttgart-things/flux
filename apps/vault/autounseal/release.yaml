---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-autounseal
  namespace: ${VAULT_NAMESPACE:-vault}
spec:
  interval: 30m
  chart:
    spec:
      chart: vault-autounseal
      version: ${VAULT_AUTOUNSEAL_VERSION:-0.5.3}
      sourceRef:
        kind: HelmRepository
        name: unseal
        namespace: ${VAULT_NAMESPACE:-vault}
      interval: 12h
  values:
    settings:
      vault_url: ${VAULT_AUTOUNSEAL_URL:-http://vault-server.vault.svc:8200}
      vault_label_selector: ${VAULT_AUTOUNSEAL_LABEL_SELECTOR:-app.kubernetes.io/component=server}
