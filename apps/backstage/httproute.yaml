---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage-httproute
  namespace: ${BACKSTAGE_NAMESPACE:-portal}
spec:
  interval: 30m
  chart:
    spec:
      chart: sthings-cluster
      version: 0.3.20
      sourceRef:
        kind: HelmRepository
        name: stuttgart-things
        namespace: ${BACKSTAGE_NAMESPACE:-portal}
      interval: 12h
  values:
    customresources:
      backstage-referencegrant:
        apiVersion: gateway.networking.k8s.io/v1beta1
        kind: ReferenceGrant
        metadata:
          name: backstage-gateway-access
          namespace: ${BACKSTAGE_NAMESPACE:-portal}
          labels:
            app.kubernetes.io/name: backstage
            app.kubernetes.io/instance: backstage
        spec:
          from:
            - group: gateway.networking.k8s.io
              kind: Gateway
              namespace: ${GATEWAY_NAMESPACE:-default}
          to:
            - group: ""
              kind: Service
      backstage-httproute:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: backstage
          namespace: ${BACKSTAGE_NAMESPACE:-portal}
          labels:
            app.kubernetes.io/name: backstage
            app.kubernetes.io/instance: backstage
        spec:
          hostnames:
            - backstage.${DOMAIN}
          parentRefs:
            - name: ${GATEWAY_NAME}
              namespace: ${GATEWAY_NAMESPACE:-default}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: backstage-deployment
                  namespace: ${BACKSTAGE_NAMESPACE:-portal}
                  port: 7007
