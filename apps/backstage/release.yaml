---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage-deployment
  namespace: ${BACKSTAGE_NAMESPACE:-portal}
spec:
  dependsOn:
    - name: backstage-configuration
      namespace: ${BACKSTAGE_NAMESPACE:-portal}
  interval: 30m
  valuesFrom:
    - kind: ConfigMap
      name: backstage-helm-overrides
      valuesKey: imageTag
      targetPath: backstage.image.tag
  chart:
    spec:
      chart: backstage
      version: ${BACKSTAGE_VERSION:-2.6.3}
      sourceRef:
        kind: HelmRepository
        name: backstage
        namespace: ${BACKSTAGE_NAMESPACE:-portal}
      interval: 12h
  values:
    global:
      storageClass: ${BACKSTAGE_STORAGE_CLASS:-nfs4-csi}
    ingress:
      enabled: false
    postgresql:
      enabled: true
      auth:
        username: backstage
        password: ${BACKSTAGE_POSTGRESQL_PASSWORD}
      architecture: standalone
    backstage:
      # Stakater Reloader: roll the Deployment when any referenced Secret/
      # ConfigMap (backstage-secrets, app-config, catalog) changes. No-op on
      # clusters without the Reloader controller (see infra/reloader).
      annotations:
        reloader.stakater.com/auto: "true"
      replicas: ${BACKSTAGE_REPLICAS:-1}
      # Generous startup budget so the first-boot catalog DB migration (against a
      # fresh Postgres) can finish before liveness kicks in. The chart default
      # startupProbe only allows ~30s (failureThreshold 3 x periodSeconds 10),
      # which the first migration overruns -> one SIGKILL/restart. failureThreshold
      # 30 x 10s = up to ~5m. Liveness stays tight for fast detection once running.
      startupProbe:
        httpGet:
          path: /.backstage/health/v1/liveness
          port: 7007
          scheme: HTTP
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: ${BACKSTAGE_STARTUP_FAILURE_THRESHOLD:-30}
        successThreshold: 1
      image:
        registry: ${BACKSTAGE_IMAGE_REGISTRY:-ghcr.io}
        repository: ${BACKSTAGE_IMAGE_REPOSITORY:-stuttgart-things/sthings-backstage}
        tag: ${BACKSTAGE_IMAGE_TAG:-latest}
        digest: ${BACKSTAGE_IMAGE_DIGEST:-""}
      extraEnvVars:
        - name: APP_TITLE
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: APP_TITLE
        - name: ORGANIZATION_NAME
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: ORGANIZATION_NAME
        - name: APP_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: APP_BASE_URL
        - name: BACKEND_BASE_URL
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: BACKEND_BASE_URL
        - name: CORS_ORIGIN
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: CORS_ORIGIN
        - name: CLAIM_MACHINERY_API_URL
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: CLAIM_MACHINERY_API_URL
        - name: CLAIM_MACHINERY_REGISTRY_URL
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: CLAIM_MACHINERY_REGISTRY_URL
        - name: AUTH_ENVIRONMENT
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: AUTH_ENVIRONMENT
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: GITHUB_TOKEN
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: GITHUB_CLIENT_ID
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: GITHUB_CLIENT_SECRET
        - name: BACKEND_SECRET
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: BACKEND_SECRET
        - name: EXTERNAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: backstage-secrets
              key: EXTERNAL_ACCESS_TOKEN
      extraAppConfig:
        - filename: app-config.extra.yaml
          configMapRef: backstage-app-config
        - filename: app-config.catalog.yaml
          configMapRef: backstage-catalog-config
