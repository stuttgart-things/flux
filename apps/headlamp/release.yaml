---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: ${HEADLAMP_NAMESPACE:-headlamp}
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: ${HEADLAMP_VERSION:-0.40.0}
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: ${HEADLAMP_NAMESPACE:-headlamp}
      interval: 12h
  values:
    config:
      watchPlugins: true
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: prometheus
            source: https://github.com/headlamp-k8s/plugins/releases/download/prometheus-0.8.2/prometheus-0.8.2.tar.gz
    httpRoute:
      enabled: true
      parentRefs:
        - name: ${GATEWAY_NAME}
          namespace: ${GATEWAY_NAMESPACE:-default}
      hostnames:
        - "${HOSTNAME}.${DOMAIN}"
