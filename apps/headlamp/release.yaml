---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: headlamp
  namespace: ${HEADLAMP_NAMESPACE:-headlamp}
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: ${HEADLAMP_VERSION:-0.40.0}
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: ${HEADLAMP_NAMESPACE:-headlamp}
      interval: 12h
