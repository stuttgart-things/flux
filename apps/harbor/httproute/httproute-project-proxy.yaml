---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-project-proxy
  namespace: ${HARBOR_NAMESPACE:-harbor}
spec:
  parentRefs:
    - name: ${GATEWAY_NAME:-cilium-gateway}
      namespace: ${GATEWAY_NAMESPACE:-default}
  hostnames:
    - "*.${HARBOR_HOSTNAME}.${HARBOR_DOMAIN}"
  rules:
    - backendRefs:
        - name: harbor-project-proxy
          port: 80
