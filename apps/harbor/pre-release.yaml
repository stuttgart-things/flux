---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor-certificate-configuration
  namespace: ${HARBOR_NAMESPACE:-harbor}
spec:
  interval: 30m
  chart:
    spec:
      chart: sthings-cluster
      version: 0.3.20
      sourceRef:
        kind: HelmRepository
        name: stuttgart-things
        namespace: ${HARBOR_NAMESPACE:-harbor}
      interval: 12h
  values:
    customresources:
      ingress-certificate-harbor:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: harbor-ingress-tls
          namespace: ${HARBOR_NAMESPACE:-harbor}
        spec:
          commonName: ${HARBOR_HOSTNAME}.${HARBOR_DOMAIN}
          dnsNames:
            - ${HARBOR_HOSTNAME}.${HARBOR_DOMAIN}
            - "*.${HARBOR_HOSTNAME}.${HARBOR_DOMAIN}"
          issuerRef:
            name: ${ISSUER_NAME}
            kind: ${ISSUER_KIND:-ClusterIssuer}
          secretName: ${HARBOR_HOSTNAME}.${HARBOR_DOMAIN}-tls
