---
apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: ${DAPR_BACKSTAGE_TPL_NAMESPACE:-backstage-workflows}
type: Opaque
stringData:
  token: ${GITHUB_TOKEN}
---
apiVersion: v1
kind: Secret
metadata:
  name: backstage-auth-token
  namespace: ${DAPR_BACKSTAGE_TPL_NAMESPACE:-backstage-workflows}
type: Opaque
stringData:
  token: ${BACKSTAGE_AUTH_TOKEN}
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-password
  namespace: ${DAPR_BACKSTAGE_TPL_NAMESPACE:-backstage-workflows}
type: Opaque
stringData:
  password: ${REDIS_PASSWORD}
