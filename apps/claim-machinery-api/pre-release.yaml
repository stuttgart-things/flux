---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: claim-machinery-api-configuration
  namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
spec:
  interval: 30m
  chart:
    spec:
      chart: sthings-cluster
      version: 0.3.20
      sourceRef:
        kind: HelmRepository
        name: stuttgart-things
        namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
      interval: 12h
  values:
    customresources:
      claim-machinery-ca-cert:
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: claim-machinery-ca
          namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
        spec:
          secretName: ${CLAIM_MACHINERY_CA_SECRET_NAME:-cluster-ca-secret}
          commonName: claim-machinery.${DOMAIN}
          dnsNames:
            - claim-machinery.${DOMAIN}
          duration: 2160h
          renewBefore: 360h
          issuerRef:
            name: ${CLAIM_MACHINERY_CA_ISSUER_NAME:-vault-pki}
            kind: ${CLAIM_MACHINERY_CA_ISSUER_KIND:-ClusterIssuer}
