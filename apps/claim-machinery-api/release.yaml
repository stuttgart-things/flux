---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: claim-machinery-api
  namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: claim-machinery-api-kustomize
  prune: true
  wait: true
  targetNamespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
  patches:
    # Remove the Ingress from the kustomize base (we use Gateway API HTTPRoute)
    - target:
        kind: Ingress
        name: claim-machinery-api
      patch: |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: claim-machinery-api
        $patch: delete
    # Override the container image tag and set server command
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              containers:
                - name: claim-machinery-api
                  image: ghcr.io/stuttgart-things/claim-machinery-api:${CLAIM_MACHINERY_API_VERSION:-v0.21.1}
                  args:
                    - server
    # Opt into Stakater Reloader so a change to the claim-machinery-api
    # ConfigMap/Secret (e.g. TEMPLATE_PROFILE_PATH) auto-rolls the Deployment.
    # NOTE: only fires on ConfigMap/Secret changes, not on edits to the
    # remote profile YAMLs (those are fetched by URL at runtime).
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
          annotations:
            reloader.stakater.com/auto: "${CLAIM_MACHINERY_RELOADER_AUTO:-true}"
    # Override TEMPLATE_PROFILE_PATH and configure homerun2 notifications
    - target:
        kind: ConfigMap
        name: claim-machinery-api
      patch: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: claim-machinery-api
        data:
          # Profile source precedence:
          #   CLAIM_MACHINERY_PROFILE_PATH -> full override (any URL, or the
          #     baked-in /app/config/profile.yaml for a version-pinned profile)
          #   else compose the remote URL from:
          #     CLAIM_MACHINERY_PROFILE_REF  (git ref/tag/sha, default main)
          #     CLAIM_MACHINERY_PROFILE_NAME (profile file name, default labul-vsphere)
          TEMPLATE_PROFILE_PATH: "${CLAIM_MACHINERY_PROFILE_PATH:-https://raw.githubusercontent.com/stuttgart-things/claim-machinery-api/${CLAIM_MACHINERY_PROFILE_REF:-main}/profiles/${CLAIM_MACHINERY_PROFILE_NAME:-labul-vsphere}.yaml}"
          ENABLE_HOMERUN: "${CLAIM_MACHINERY_ENABLE_HOMERUN:-false}"
          HOMERUN_URL: "${CLAIM_MACHINERY_HOMERUN_URL:-}"
    # Inject homerun auth token from Secret
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: | # pragma: allowlist secret
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              containers:
                - name: claim-machinery-api
                  env:
                    - name: HOMERUN_AUTH_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ${CLAIM_MACHINERY_AUTH_SECRET_NAME:-claim-machinery-auth}
                          key: ${CLAIM_MACHINERY_AUTH_SECRET_KEY:-HOMERUN_AUTH_TOKEN}
                          optional: true
    # Mount trust-manager CA bundle for TLS trust
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              volumes:
                - name: trust-bundle
                  configMap:
                    name: ${CLAIM_MACHINERY_TRUST_BUNDLE_CONFIGMAP:-cluster-trust-bundle}
                    optional: true
              containers:
                - name: claim-machinery-api
                  env:
                    - name: SSL_CERT_DIR
                      value: ${CLAIM_MACHINERY_SSL_CERT_DIR:-/etc/ssl/custom}
                  volumeMounts:
                    - name: trust-bundle
                      mountPath: ${CLAIM_MACHINERY_SSL_CERT_DIR:-/etc/ssl/custom}/${CLAIM_MACHINERY_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      subPath: ${CLAIM_MACHINERY_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      readOnly: true
