---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: claim-machinery-api
  namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: claim-machinery-api-kustomize
  prune: true
  wait: true
  targetNamespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
  patches:
    # Remove the Ingress from the kustomize base (we use Gateway API HTTPRoute)
    - target:
        kind: Ingress
        name: claim-machinery-api
      patch: |
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: claim-machinery-api
        $patch: delete
    # Override the container image tag and set server command
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              containers:
                - name: claim-machinery-api
                  image: ghcr.io/stuttgart-things/claim-machinery-api:${CLAIM_MACHINERY_API_VERSION:-v0.5.6}
                  args:
                    - server
    # Override TEMPLATE_PROFILE_PATH and configure homerun2 notifications
    - target:
        kind: ConfigMap
        name: claim-machinery-api
      patch: |
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: claim-machinery-api
        data:
          TEMPLATE_PROFILE_PATH: ${CLAIM_MACHINERY_PROFILE_PATH}
          ENABLE_HOMERUN: "${CLAIM_MACHINERY_ENABLE_HOMERUN:-false}"
          HOMERUN_URL: "${CLAIM_MACHINERY_HOMERUN_URL:-}"
    # Inject homerun auth token from Secret
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              containers:
                - name: claim-machinery-api
                  env:
                    - name: HOMERUN_AUTH_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ${CLAIM_MACHINERY_AUTH_SECRET_NAME:-claim-machinery-auth}
                          key: ${CLAIM_MACHINERY_AUTH_SECRET_KEY:-HOMERUN_AUTH_TOKEN}
                          optional: true
    # Mount trust-manager CA bundle for TLS trust
    - target:
        kind: Deployment
        name: claim-machinery-api
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: claim-machinery-api
        spec:
          template:
            spec:
              volumes:
                - name: trust-bundle
                  configMap:
                    name: ${CLAIM_MACHINERY_TRUST_BUNDLE_CONFIGMAP:-cluster-trust-bundle}
                    optional: true
              containers:
                - name: claim-machinery-api
                  env:
                    - name: SSL_CERT_DIR
                      value: ${CLAIM_MACHINERY_SSL_CERT_DIR:-/etc/ssl/custom}
                  volumeMounts:
                    - name: trust-bundle
                      mountPath: ${CLAIM_MACHINERY_SSL_CERT_DIR:-/etc/ssl/custom}/${CLAIM_MACHINERY_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      subPath: ${CLAIM_MACHINERY_TRUST_BUNDLE_KEY:-trust-bundle.pem}
                      readOnly: true
