---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claim-machinery-api
  namespace: ${CLAIM_MACHINERY_API_NAMESPACE:-claim-machinery}
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE:-default}
  hostnames:
    - ${HOSTNAME}.${DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: claim-machinery-api
          port: 8080
