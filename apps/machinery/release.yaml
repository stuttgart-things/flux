---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: machinery
  namespace: ${MACHINERY_NAMESPACE:-machinery}
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: machinery-kustomize
  prune: true
  wait: true
  targetNamespace: ${MACHINERY_NAMESPACE:-machinery}
  patches:
    # Override the container image tag
    - target:
        kind: Deployment
        name: machinery
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: machinery
        spec:
          template:
            spec:
              containers:
                - name: machinery
                  image: ghcr.io/stuttgart-things/machinery:${MACHINERY_VERSION:-v1.0.0}
    # Inject MACHINERY_CONFIG from ConfigMap (if exists)
    - target:
        kind: Deployment
        name: machinery
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: machinery
        spec:
          template:
            spec:
              containers:
                - name: machinery
                  env:
                    - name: MACHINERY_CONFIG
                      valueFrom:
                        configMapKeyRef:
                          name: machinery-config
                          key: config.json
                          optional: true
    # Add HTTP port to deployment
    - target:
        kind: Deployment
        name: machinery
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: machinery
        spec:
          template:
            spec:
              containers:
                - name: machinery
                  ports:
                    - name: grpc
                      containerPort: 50051
                      protocol: TCP
                    - name: http
                      containerPort: 8080
                      protocol: TCP
    # Add HTTP port to service
    - target:
        kind: Service
        name: machinery
      patch: |
        apiVersion: v1
        kind: Service
        metadata:
          name: machinery
        spec:
          ports:
            - name: grpc
              port: 50051
              targetPort: grpc
              protocol: TCP
            - name: http
              port: 8080
              targetPort: http
              protocol: TCP
    # Remove the KCL-generated HTTPRoute (we provide our own via flux)
    - target:
        kind: HTTPRoute
        name: machinery
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: machinery
        $patch: delete
