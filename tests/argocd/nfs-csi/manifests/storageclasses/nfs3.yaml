---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs3-csi
provisioner: nfs.csi.k8s.io
parameters:
  server: nfs.example.com
  share: /exports
  subDir: DOWNSTREAM
  mountPermissions: "0"
  onDelete: archive
volumeBindingMode: Immediate
allowVolumeExpansion: true
reclaimPolicy: Delete
mountOptions:
  - nfsvers=3
  - rsize=1048576
  - wsize=1048576
  - tcp
  - hard
  - nolock
