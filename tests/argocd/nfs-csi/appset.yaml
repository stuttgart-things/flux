---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfs-csi-install
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/nfs-csi/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'nfs-csi-install-{{ .cluster.name }}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
      labels:
        app.kubernetes.io/part-of: nfs-csi
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      sources:
        - repoURL: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
          chart: csi-driver-nfs
          targetRevision: '{{ .nfsCsi.chartVersion }}'
          helm:
            releaseName: nfs-csi
            valueFiles:
              - $values/tests/argocd/nfs-csi/clusters/{{ .cluster.name }}/values.yaml
        - repoURL: https://github.com/stuttgart-things/flux.git
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .nfsCsi.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nfs-csi-storageclasses
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/nfs-csi/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'nfs-csi-storageclasses-{{ .cluster.name }}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      labels:
        app.kubernetes.io/part-of: nfs-csi
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/stuttgart-things/flux.git
        targetRevision: HEAD
        path: tests/argocd/nfs-csi/manifests/storageclasses
        kustomize:
          patches:
            - target:
                kind: StorageClass
                name: nfs3-csi
              patch: |
                - op: replace
                  path: /parameters/server
                  value: '{{ .nfs.server }}'
                - op: replace
                  path: /parameters/share
                  value: '{{ .nfs.share }}'
                - op: replace
                  path: /parameters/subDir
                  value: '{{ .nfs.subDir }}'
            - target:
                kind: StorageClass
                name: nfs4-csi
              patch: |
                - op: replace
                  path: /parameters/server
                  value: '{{ .nfs.server }}'
                - op: replace
                  path: /parameters/share
                  value: '{{ .nfs.share }}'
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .nfsCsi.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
