---
cluster:
  name: example
  server: https://kubernetes.default.svc
tekton:
  operatorNamespace: tekton-operator
  targetNamespace: tekton-pipelines
  profile: all
  enableApiFields: beta
  disableInlineSpec: ""
  prunerDisabled: false
  prunerSchedule: "0 8 * * *"
  prunerKeepSince: 1440
ciNamespace:
  name: tekton-ci
dashboard:
  namespace: tekton-pipelines
  hostname: tekton
  domain: example.com
  gatewayName: cilium-gateway
  gatewayNamespace: default
