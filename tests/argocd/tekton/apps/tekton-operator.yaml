---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://github.com/stuttgart-things/flux.git
    targetRevision: HEAD
    path: cicd/tekton/components/operator
    directory:
      recurse: false
      exclude: 'kustomization.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
