---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-ci-namespace
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/stuttgart-things/flux.git
    targetRevision: HEAD
    path: tests/argocd/tekton/manifests/ci-namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
