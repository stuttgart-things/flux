---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tekton-dashboard
  namespace: tekton-pipelines
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: default
  hostnames:
    - "tekton.example.com"
  rules:
    - backendRefs:
        - name: tekton-dashboard
          port: 9097
