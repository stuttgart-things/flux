---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stuttgart-things/flux.git
    targetRevision: HEAD
    path: tests/argocd/openebs/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
