---
cluster:
  name: example
  server: https://kubernetes.default.svc
certManager:
  chartVersion: v1.19.2
  namespace: cert-manager
bootstrap:
  caName: cluster-ca
  caSecret: cluster-ca-secret
  wildcardCertName: wildcard-tls
  wildcardSecret: wildcard-tls
  wildcardNamespace: default
  domain: example.com
