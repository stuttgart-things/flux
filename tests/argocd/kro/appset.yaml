---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kro
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/kro/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'kro-{{ .cluster.name }}'
      labels:
        app.kubernetes.io/part-of: kro
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      sources:
        - repoURL: registry.k8s.io/kro/charts
          chart: kro
          targetRevision: '{{ .kro.chartVersion }}'
          helm:
            releaseName: kro
            valueFiles:
              - $values/tests/argocd/kro/clusters/{{ .cluster.name }}/values.yaml
        - repoURL: https://github.com/stuttgart-things/flux.git
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .kro.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - Replace=true
