---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.18.5
    helm:
      releaseName: cilium
      valuesObject:
        kubeProxyReplacement: true
        k8sServiceHost: ""
        k8sServicePort: 6443
        operator:
          replicas: 1
        gatewayAPI:
          enabled: true
        l2announcements:
          enabled: true
        externalIPs:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
