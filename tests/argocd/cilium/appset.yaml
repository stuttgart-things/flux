---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium-install
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/cilium/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'cilium-install-{{ .cluster.name }}'
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
      labels:
        app.kubernetes.io/part-of: cilium
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      sources:
        - repoURL: https://helm.cilium.io
          chart: cilium
          targetRevision: '{{ .cilium.chartVersion }}'
          helm:
            releaseName: cilium
            valueFiles:
              - $values/tests/argocd/cilium/clusters/{{ .cluster.name }}/values.yaml
        - repoURL: https://github.com/stuttgart-things/flux.git
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .cilium.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium-lb
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/cilium/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'cilium-lb-{{ .cluster.name }}'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
      labels:
        app.kubernetes.io/part-of: cilium
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/stuttgart-things/flux.git
        targetRevision: HEAD
        path: tests/argocd/cilium/manifests/lb
        kustomize:
          patches:
            - target:
                kind: CiliumLoadBalancerIPPool
                name: default-pool
              patch: |
                - op: replace
                  path: /spec/blocks/0/start
                  value: '{{ .lb.ipStart }}'
                - op: replace
                  path: /spec/blocks/0/stop
                  value: '{{ .lb.ipStop }}'
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .cilium.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium-gateway
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/stuttgart-things/flux.git
        revision: HEAD
        files:
          - path: tests/argocd/cilium/clusters/*/cluster.yaml
  template:
    metadata:
      name: 'cilium-gateway-{{ .cluster.name }}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
      labels:
        app.kubernetes.io/part-of: cilium
        cluster: '{{ .cluster.name }}'
    spec:
      project: default
      source:
        repoURL: https://github.com/stuttgart-things/flux.git
        targetRevision: HEAD
        path: tests/argocd/cilium/manifests/gateway
        kustomize:
          patches:
            - target:
                kind: Gateway
                name: cilium-gateway
              patch: |
                - op: replace
                  path: /spec/listeners/0/hostname
                  value: '*.{{ .gateway.domain }}'
                - op: replace
                  path: /spec/listeners/0/tls/certificateRefs/0/name
                  value: '{{ .gateway.tlsSecret }}'
                - op: replace
                  path: /spec/listeners/1/hostname
                  value: '*.{{ .gateway.domain }}'
      destination:
        server: '{{ .cluster.server }}'
        namespace: '{{ .gateway.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
