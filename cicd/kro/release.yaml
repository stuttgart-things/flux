---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kro
  namespace: ${KRO_NAMESPACE:-kro-system}
spec:
  interval: 30m
  chart:
    spec:
      chart: kro
      version: ${KRO_VERSION:-0.9.1}
      sourceRef:
        kind: HelmRepository
        name: kro
        namespace: ${KRO_NAMESPACE:-kro-system}
      interval: 12h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
