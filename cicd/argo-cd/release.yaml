---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd-deployment
  namespace: ${ARGO_CD_NAMESPACE:-argocd}
spec:
  dependsOn:
    - name: argocd-configuration
      namespace: ${ARGO_CD_NAMESPACE:-argocd}
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: argo-cd
      version: ${ARGO_CD_VERSION:-9.4.15}
      sourceRef:
        kind: HelmRepository
        name: argocd
        namespace: ${ARGO_CD_NAMESPACE:-argocd}
      interval: 12h
  values:
    server:
      extraArgs:
        - --insecure
      extensions:
        enabled: ${ARGO_CD_EXTENSIONS_ENABLED:-false}
        extensionList:
          - name: argo-rollouts
            env:
              - name: EXTENSION_URL
                value: ${ARGO_CD_ROLLOUT_EXTENSION_URL:-https://github.com/argoproj-labs/rollout-extension/releases/download/v0.3.7/extension.tar}
      ingress:
        enabled: ${ARGO_CD_INGRESS_ENABLED:-false}
        annotations:
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        ingressClassName: ${ARGO_CD_INGRESS_CLASS:-nginx}
        hostname: ${INGRESS_HOSTNAME}.${INGRESS_DOMAIN}
        tls: true
    configs:
      secret:
        argocdServerAdminPassword: ${ARGO_CD_SERVER_ADMIN_PASSWORD}
        argocdServerAdminPasswordMtime: ${ARGO_CD_PASSWORD_MTIME:-2024-09-16T12:51:06UTC}
      cmp:
        create: true
        plugins:
          argocd-vault-plugin:
            allowConcurrency: true
            discover:
              find:
                command:
                  - sh
                  - "-c"
                  - "find . -name '*.yaml' | xargs grep -l 'avp.kubernetes.io'"
            generate:
              command:
                - argocd-vault-plugin
                - generate
                - "."
            lockRepo: false
          argocd-vault-plugin-kustomize:
            allowConcurrency: true
            discover:
              find:
                command:
                  - find
                  - "."
                  - -name
                  - kustomization.yaml
            generate:
              command:
                - sh
                - "-c"
                - "kustomize build . | argocd-vault-plugin generate -"
            lockRepo: false
          argocd-vault-plugin-helm:
            allowConcurrency: true
            discover:
              find:
                command:
                  - sh
                  - "-c"
                  - "find . -name 'Chart.yaml' && find . -name 'values.yaml'"
            init:
              command:
                - sh
                - "-c"
                - "helm dependency update"
            generate:
              command:
                - sh
                - "-c"
                - |
                  helm template "$${ARGOCD_APP_NAME}" -f <(echo "$${ARGOCD_ENV_HELM_VALUES}") --include-crds . -n "$${ARGOCD_APP_NAMESPACE}" | argocd-vault-plugin generate -
            lockRepo: false
          sops-decrypt:
            allowConcurrency: true
            discover:
              find:
                command:
                  - sh
                  - "-c"
                  - "find . -name '*.enc.yaml' | head -1"
            generate:
              command:
                - sh
                - "-c"
                - |
                  set -e
                  # Emit ONLY files the plugin itself decrypts, in a stable order.
                  # Apps mixing encrypted + plaintext manifests should use
                  # sops-decrypt-kustomize and list both in resources:.
                  find . -name '*.enc.yaml' | sort | while read -r f; do
                    sops -d "$f"
                    echo '---'
                  done
            lockRepo: false
          sops-decrypt-kustomize:
            allowConcurrency: true
            discover:
              find:
                command:
                  - sh
                  - "-c"
                  - "find . -name '*.enc.yaml' | head -1"
            generate:
              command:
                - sh
                - "-c"
                - |
                  set -e
                  find . -name '*.enc.yaml' | while read -r f; do
                    sops -d "$f" > "$${f%.enc.yaml}.yaml"
                    rm -f "$f"
                  done
                  kustomize build .
            lockRepo: false
          sops-decrypt-helm:
            allowConcurrency: true
            discover:
              find:
                command:
                  - sh
                  - "-c"
                  - "find . -name '*.enc.yaml' | head -1"
            init:
              command:
                - sh
                - "-c"
                - "helm dependency update"
            generate:
              command:
                - sh
                - "-c"
                - |
                  set -e
                  find . -name '*.enc.yaml' | while read -r f; do
                    sops -d "$f" > "$${f%.enc.yaml}.yaml"
                    rm -f "$f"
                  done
                  helm template "$${ARGOCD_APP_NAME}" \
                    -f <(echo "$${ARGOCD_ENV_HELM_VALUES}") \
                    --include-crds . \
                    -n "$${ARGOCD_APP_NAMESPACE}"
            lockRepo: false
    repoServer:
      extraContainers:
        - name: argocd-vault-plugin
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_AVP:-ghcr.io/stuttgart-things/sthings-avp:1.18.1-1.35.3-4.1.4-5.8.1}
          env:
            - name: SSL_CERT_DIR
              value: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}
          envFrom:
            - secretRef:
                name: argocd-vault-plugin-credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: argocd-vault-plugin.yaml
              name: argocd-cmp-cm
            - mountPath: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}/${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              subPath: ${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              name: trust-bundle
              readOnly: true
        - name: argocd-vault-plugin-helm
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_AVP:-ghcr.io/stuttgart-things/sthings-avp:1.18.1-1.35.3-4.1.4-5.8.1}
          env:
            - name: SSL_CERT_DIR
              value: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}
          envFrom:
            - secretRef:
                name: argocd-vault-plugin-credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: argocd-vault-plugin-helm.yaml
              name: argocd-cmp-cm
            - mountPath: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}/${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              subPath: ${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              name: trust-bundle
              readOnly: true
        - name: argocd-vault-plugin-kustomize
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_AVP:-ghcr.io/stuttgart-things/sthings-avp:1.18.1-1.35.3-4.1.4-5.8.1}
          env:
            - name: SSL_CERT_DIR
              value: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}
          envFrom:
            - secretRef:
                name: argocd-vault-plugin-credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: argocd-vault-plugin-kustomize.yaml
              name: argocd-cmp-cm
            - mountPath: ${AVP_SSL_CERT_DIR:-/etc/ssl/custom}/${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              subPath: ${AVP_TRUST_BUNDLE_KEY:-trust-bundle.pem}
              name: trust-bundle
              readOnly: true
        - name: sops-decrypt
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_SOPS_CMP:-ghcr.io/stuttgart-things/sthings-sops-cmp:3.12.2-1.3.1-5.8.1-4.1.4}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: sops-decrypt.yaml
              name: argocd-cmp-cm
            - mountPath: /.config/sops/age
              name: sops-age-key
              readOnly: true
        - name: sops-decrypt-kustomize
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_SOPS_CMP:-ghcr.io/stuttgart-things/sthings-sops-cmp:3.12.2-1.3.1-5.8.1-4.1.4}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: sops-decrypt-kustomize.yaml
              name: argocd-cmp-cm
            - mountPath: /.config/sops/age
              name: sops-age-key
              readOnly: true
        - name: sops-decrypt-helm
          command: [/var/run/argocd/argocd-cmp-server]
          image: ${IMAGE_SOPS_CMP:-ghcr.io/stuttgart-things/sthings-sops-cmp:3.12.2-1.3.1-5.8.1-4.1.4}
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - mountPath: /var/run/argocd
              name: var-files
            - mountPath: /home/argocd/cmp-server/plugins
              name: plugins
            - mountPath: /tmp
              name: tmp
            - mountPath: /home/argocd/cmp-server/config/plugin.yaml
              subPath: sops-decrypt-helm.yaml
              name: argocd-cmp-cm
            - mountPath: /.config/sops/age
              name: sops-age-key
              readOnly: true
      volumes:
        - name: argocd-cmp-cm
          configMap:
            name: argocd-cmp-cm
        - name: trust-bundle
          configMap:
            name: ${AVP_TRUST_BUNDLE_CONFIGMAP:-cluster-trust-bundle}
            optional: true
        - name: sops-age-key
          secret:
            secretName: ${ARGOCD_SOPS_AGE_KEY_SECRET:-argocd-sops-age-key}
            optional: true
        - name: helmfile-tmp
          emptyDir: {}
        - name: cmp-tmp
          emptyDir: {}
