---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: ${TRUST_MANAGER_NAMESPACE:-cert-manager}
spec:
  interval: 20m
  chart:
    spec:
      chart: trust-manager
      version: ${TRUST_MANAGER_VERSION:-0.22.0}
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: ${TRUST_MANAGER_NAMESPACE:-cert-manager}
      interval: 12h
  values:
    app:
      trust:
        namespace: ${TRUST_MANAGER_TRUST_NAMESPACE:-cert-manager}
