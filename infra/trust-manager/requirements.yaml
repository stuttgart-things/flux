---
apiVersion: v1
kind: Namespace
metadata:
  name: ${TRUST_MANAGER_NAMESPACE:-cert-manager}
  labels:
    toolkit.fluxcd.io/tenant: sthings-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: ${TRUST_MANAGER_NAMESPACE:-cert-manager}
spec:
  interval: 24h
  url: https://charts.jetstack.io
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stuttgart-things
  namespace: ${TRUST_MANAGER_NAMESPACE:-cert-manager}
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/stuttgart-things
