---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: ${KPS_NAMESPACE:-monitoring}
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ${KPS_VERSION:-85.2.1}
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: ${KPS_NAMESPACE:-monitoring}
      interval: 12h
  values:
    # CRDs (prometheus-operator) are rendered as normal templates by the
    # chart's crds subchart. If a future upgrade fails with "metadata.
    # annotations: Too long", install the CRDs via a separate Kustomization
    # and set crds.enabled=false here -- see README.
    crds:
      enabled: true

    # Keep the chart's curated default alert rules -- these are what
    # Alertmanager fires on (e.g. KubePodCrashLooping would have caught
    # the snapshot-controller 11k-restart loop on day one).
    defaultRules:
      create: true

    # ---- Control-plane scrape jobs: disabled ----
    # Cilium runs in kube-proxy-replacement mode (no kube-proxy DaemonSet),
    # and RKE2 static-pod control-plane components bind their metrics
    # endpoints to localhost. The default ServiceMonitors would only
    # produce permanent "TargetDown" noise. Node, workload, kubelet and
    # kube-apiserver metrics are unaffected and still scraped.
    kubeProxy:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false

    # ---- prometheus-operator ----
    prometheusOperator:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 256Mi

    # ---- Prometheus ----
    prometheus:
      prometheusSpec:
        replicas: 1
        # 60s (vs the chart default 30s) roughly halves scrape CPU and
        # TSDB write volume -- the main "performance cost" lever.
        scrapeInterval: ${KPS_SCRAPE_INTERVAL:-60s}
        evaluationInterval: ${KPS_SCRAPE_INTERVAL:-60s}
        retention: ${KPS_PROMETHEUS_RETENTION:-15d}
        # Discover ServiceMonitors / PodMonitors / Rules from ALL
        # namespaces, not just objects carrying this release's label.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1536Mi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ${KPS_PROMETHEUS_STORAGE_CLASS:-nfs4-csi}
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: ${KPS_PROMETHEUS_STORAGE_SIZE:-10Gi}

    # ---- Alertmanager ----
    # Routes warning|critical alerts to MS Teams via the homerun2-notification-catcher
    # pipeline:
    #     AM ─▶ omni-pitcher /pitch/grafana ─▶ Redis stream "alerts"
    #                                            └▶ notification-catcher ─▶ Teams
    # The catcher does the Adaptive Card formatting (Go code, version-
    # controlled) and applies its own filter (severity_min: warning) as a
    # second-layer gate. info-level alerts and the always-on Watchdog still
    # fall through to the null receiver and are dropped here.
    # Replaces the previous prometheus-msteams proxy hop (kept deployed for
    # now until the new path is verified; remove the proxy in a follow-up).
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        retention: 120h
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
      # No storage block -> emptyDir. Silences do not survive a restart,
      # which is acceptable for this cluster.
      config:
        route:
          receiver: 'null'
          group_by: ['namespace', 'alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: msteams
              matchers:
                - severity =~ "warning|critical"
        receivers:
          - name: 'null'
          - name: msteams
            webhook_configs:
              # Delivered to homerun2-omni-pitcher's /pitch/grafana endpoint
              # (Alertmanager's webhook v4 payload is field-compatible with
              # Grafana's). Bearer token matches the pitcher's AUTH_TOKEN.
              # See: stuttgart-things/homerun2-notification-catcher/docs/alertmanager.md
              - url: http://homerun2-omni-pitcher.${HOMERUN2_NAMESPACE:-homerun2}.svc.cluster.local/pitch/grafana
                send_resolved: true
                http_config:
                  authorization:
                    type: Bearer
                    credentials: ${HOMERUN2_OMNI_PITCHER_AUTH_TOKEN:-changeme}
        inhibit_rules:
          - source_matchers: ['severity = "critical"']
            target_matchers: ['severity =~ "warning|info"']
            equal: ['namespace', 'alertname']
          - source_matchers: ['severity = "warning"']
            target_matchers: ['severity = "info"']
            equal: ['namespace', 'alertname']
        templates:
          - /etc/alertmanager/config/*.tmpl

    # ---- Grafana ----
    # Ephemeral: no PVC. The bundled dashboards are provisioned from
    # ConfigMaps by the sidecar on every start, so nothing is lost on
    # restart. Manual in-UI dashboard/user edits would not persist.
    grafana:
      enabled: true
      replicas: 1
      adminPassword: ${KPS_GRAFANA_ADMIN_PASSWORD:-prom-operator}
      # Bundled Kubernetes / Node Exporter / Prometheus dashboards.
      defaultDashboardsEnabled: true
      defaultDashboardsTimezone: browser
      persistence:
        enabled: false
      # Routed via Gateway API HTTPRoute (httproute.yaml), not chart Ingress.
      ingress:
        enabled: false
      grafana.ini:
        server:
          root_url: "https://${HOSTNAME}.${DOMAIN}"
      # Observed baseline with the bundled dashboard set is ~400-450Mi;
      # 768Mi limit leaves headroom for query/render load. Request stays
      # modest so scheduling overhead is low.
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          memory: 768Mi

    # ---- node-exporter (DaemonSet, one pod per node) ----
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 10m
          memory: 24Mi
        limits:
          memory: 64Mi

    # ---- kube-state-metrics ----
    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi
