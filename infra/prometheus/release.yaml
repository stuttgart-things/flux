---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: ${PROMETHEUS_NAMESPACE:-monitoring}
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus
      version: ${PROMETHEUS_VERSION:-28.13.0}
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: ${PROMETHEUS_NAMESPACE:-monitoring}
      interval: 12h
  values:
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    kube-state-metrics:
      enabled: true
    prometheus-node-exporter:
      enabled: true
    server:
      persistentVolume:
        enabled: true
        storageClass: ${PROMETHEUS_STORAGE_CLASS:-nfs4-csi}
        size: ${PROMETHEUS_STORAGE_SIZE:-10Gi}
      retention: ${PROMETHEUS_RETENTION:-15d}
