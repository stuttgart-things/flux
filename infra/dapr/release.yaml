---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dapr
  namespace: ${DAPR_NAMESPACE:-dapr-system}
spec:
  interval: 20m
  chart:
    spec:
      chart: dapr
      version: ${DAPR_VERSION:-1.17.4}
      sourceRef:
        kind: HelmRepository
        name: dapr
        namespace: ${DAPR_NAMESPACE:-dapr-system}
      interval: 12h
  values:
    global:
      ha:
        enabled: ${DAPR_HA_ENABLED:-false}
      logAsJson: true
    dapr_operator:
      logLevel: info
    dapr_placement:
      logLevel: info
    dapr_sidecar_injector:
      logLevel: info
    dapr_scheduler:
      logLevel: info
