---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: ${VELERO_NAMESPACE:-velero}
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: velero
      version: ${VELERO_VERSION:-9.0.0}
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: ${VELERO_NAMESPACE:-velero}
      interval: 12h
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:${VELERO_PLUGIN_AWS_VERSION:-1.14.1}
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: plugins
            mountPath: /target
    credentials:
      useSecret: true
      existingSecret: cloud-credentials
    # Trust-bundle: mount is always present with optional: true (harmless
    # if trust-manager hasn't published the ConfigMap to this namespace).
    # SSL_CERT_DIR is empty by default — Go's crypto/x509 treats unset/""
    # the same as not-set, so system CAs are used. To activate the bundle,
    # consumers set VELERO_SSL_CERT_DIR=/etc/ssl/custom (or wherever the
    # bundle is mounted). Pattern mirrors apps/clusterbook-operator.
    extraVolumes:
      - name: trust-bundle
        configMap:
          name: ${VELERO_TRUST_BUNDLE_CONFIGMAP:-cluster-trust-bundle}
          optional: true
    extraVolumeMounts:
      - name: trust-bundle
        mountPath: ${VELERO_TRUST_BUNDLE_MOUNT_PATH:-/etc/ssl/custom}
        readOnly: true
    configuration:
      extraEnvVars:
        SSL_CERT_DIR: ${VELERO_SSL_CERT_DIR:-}
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${VELERO_BUCKET}
          default: true
          config:
            region: ${VELERO_S3_REGION:-minio}
            s3ForcePathStyle: "${VELERO_S3_FORCE_PATH_STYLE:-true}"
            s3Url: ${VELERO_S3_ENDPOINT}
            insecureSkipTLSVerify: "${VELERO_S3_INSECURE_SKIP_TLS_VERIFY:-false}"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: ${VELERO_S3_REGION:-minio}
    snapshotsEnabled: ${VELERO_SNAPSHOTS_ENABLED:-false}
    deployNodeAgent: ${VELERO_DEPLOY_NODE_AGENT:-false}
    metrics:
      enabled: ${VELERO_METRICS_ENABLED:-true}
      serviceMonitor:
        enabled: ${VELERO_SERVICE_MONITOR_ENABLED:-false}
        additionalLabels:
          release: prometheus
    schedules: {}
    upgradeJob:
      enabled: false
    cleanUpCRDs: false
    # The chart's upgradeCRDs pre-install hook needs a kubectl image.
    # bitnami sunset their free Docker Hub catalogue in late 2025
    # (docker.io/bitnami/kubectl has only `latest` and SHA tags now);
    # working semver tags moved to bitnamilegacy.
    kubectl:
      image:
        repository: ${VELERO_KUBECTL_IMAGE_REPOSITORY:-docker.io/bitnamilegacy/kubectl}
        tag: ${VELERO_KUBECTL_IMAGE_TAG:-1.33.4}
