---
# Single-host (non-wildcard) certificate signed by an existing ClusterIssuer.
# Companion to ../extra-certificate (which is wildcard-only). Defaults target
# the harvester.sthings.lab dashboard cert; override the variables per consumer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ${HOST_CERT_NAME:-harvester-tls}
  namespace: ${HOST_CERT_NAMESPACE:-default}
spec:
  secretName: ${HOST_CERT_SECRET_NAME:-harvester-tls}
  issuerRef:
    name: ${HOST_CERT_ISSUER:-vault-pki}
    kind: ${HOST_CERT_ISSUER_KIND:-ClusterIssuer}
  commonName: ${HOST_CERT_COMMON_NAME:-harvester.sthings.lab}
  dnsNames:
    - ${HOST_CERT_COMMON_NAME:-harvester.sthings.lab}
  duration: ${HOST_CERT_DURATION:-2160h}       # 90 days
  renewBefore: ${HOST_CERT_RENEW_BEFORE:-360h}  # renew 15 days before expiry
